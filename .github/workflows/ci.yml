name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run pytest

  test-self-hosted:
    name: Test (self-hosted python-ci)
    if: >
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'run-self-hosted')
    runs-on: [self-hosted, linux, x64, python-ci]
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Show runner context
        run: |
          echo "runner.name=${RUNNER_NAME}"
          echo "runner.os=${RUNNER_OS}"
          python --version

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run pytest